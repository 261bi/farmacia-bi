name: farmacia-bi-oltp

services:
  mysql-farmadb:
    image: mysql:8.4
    container_name: farmacia-oltp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: farmadb
      TZ: America/Lima
    ports:
      - "13306:3306"
    volumes:
      - mysql_farmadb_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - farmacia-bi-net

volumes:
  mysql_farmadb_data:

networks:
  farmacia-bi-net:
    name: farmacia-bi-net
