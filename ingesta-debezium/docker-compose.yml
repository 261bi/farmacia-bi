# objetivo: usar MySQL OLTP y PostgreSQL DW del proyecto farmacia-bi
# https://debezium.io/documentation/reference/2.7/connectors/mysql.html
# y mantener sincronizados ambos sistemas (Change Data Capture), para esto se necesita un conector de debezium para mysql, y otro sink jdbc para postgresql



name: farmacia-bi-debezium

services:
  zookeeper:
    image: debezium/zookeeper:2.7.3.Final
    ports:
      - "32181:2181"
    networks:
      - farmacia-bi-net

  kafka:
    image: debezium/kafka:2.7.3.Final
    ports:
      - "39092:9092"
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - farmacia-bi-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: farmacia-bi-debezium-kafka-ui
    restart: unless-stopped
    ports:
      - "38085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: farmacia-bi-debezium
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - farmacia-bi-net

  connect:
    image: debezium/connect:2.7.3.Final
    ports:
      - "38083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: "connect_configs"
      OFFSET_STORAGE_TOPIC: "connect_offsets"
      STATUS_STORAGE_TOPIC: "connect_statuses"
    depends_on:
      - kafka
    networks:
      - farmacia-bi-net

networks:
  farmacia-bi-net:
    external: true
    name: farmacia-bi-net
